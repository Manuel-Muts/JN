<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | LET'S TALK</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo"><strong>LET'S</strong> TALK</div>
        <div class="links">
            <a href="admin.html" class="admin-link">Admin</a>
            <div id="user-profile-nav" style="display: flex; align-items: center; gap: 10px;">
                <span id="user-display-name" style="font-weight: 600;"></span>
                <button id="user-logout-btn" class="secondary-btn" style="width: auto; margin: 0; padding: 0.4rem 1rem;">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <header style="text-align: center; margin-bottom: 3rem;">
            <h1 class="glow-title">Welcome Back! ✨</h1>
            <p>Your personal space for insights and conversations.</p>
            <div style="max-width: 500px; margin: 2rem auto 0 auto;">
                <input type="text" id="search-bar" placeholder="Search your stories...">
            </div>
        </header>

        <!-- Client Tab Navigation -->
        <div class="admin-tabs client-tabs" style="margin-bottom: 2rem;">
            <button class="tab-btn active" data-tab="stories-tab"><i class="fas fa-book-open"></i> Stories</button>
            <button id="live-chat-tab-btn" class="tab-btn" data-tab="live-chat-section" style="display: none;"><i class="fas fa-comments"></i> Live Chat</button>
        </div>

        <!-- Tab content: Stories -->
        <div id="stories-tab" class="tab-content active">
            <div id="blog-feed" class="blog-grid">
                <!-- Full content injected by JS -->
            </div>
            <!-- Infinite Scroll Sentinel -->
            <div id="infinite-scroll-sentinel" style="text-align: center; padding: 2rem 0; min-height: 50px;"></div>
        </div>

        <!-- Tab content: Live Community Chat -->
        <div id="live-chat-section" class="tab-content">
            <div class="interaction-box">
                <h3 style="margin-bottom: 1rem;">Live Chat</h3>
                <div id="live-messages-container" style="height: 450px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 1rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 1rem;">
                    <!-- Real-time messages will appear here -->
                </div>
                <form id="live-chat-form" style="display: flex; gap: 10px; align-items: flex-end;">
                   <textarea id="live-chat-input" placeholder="Type a message..." rows="1"></textarea>
                    <button type="submit" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                        <span class="btn-text">Send Message</span>
                    </button>
                </form>
            </div>
        </div>
    </div> <!-- End .container -->

    <audio id="bg-music" loop>
        <source src="music/cecilwinas1.mp3" type="audio/mpeg">
    </audio>

    <button id="back-to-top" title="Back to top">↑</button>
    <button id="music-toggle">🎧</button>

    <!-- Floating Live Chat Button -->
    <button id="open-dm-btn" title="Open Live Chat" style="position: fixed; bottom: 140px; right: 20px; width: 48px; height: 48px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 99; background: #2563eb; color: white; border: none; cursor: pointer; font-size: 1.2rem;">
        <i class="fas fa-comments"></i>
    </button>

    <!-- Reply Modal -->
    <div id="reply-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h3>Reply to: <span id="modal-post-title"></span></h3>
            <form id="reply-form">
                <textarea id="reply-message" placeholder="Type your reply here..."></textarea>
                <input type="hidden" id="hidden-post-id">
                <input type="hidden" id="hidden-post-title">
                <button type="submit" id="submit-reply-btn">Submit Reply</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/app.js"></script>

    <footer style="text-align:center; margin-top:3rem; padding-bottom: 2rem;">
        <a href="privacy.html">Privacy Policy</a> |
        <a href="terms.html">Terms of Use</a>
    </footer>
</body>
</html>
