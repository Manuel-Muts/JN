
           <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>| Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Quill.js CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <section id="login-section">
            <h1> Login</h1>
            <input type="email" id="email" placeholder="Admin Email">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Login</button>
            <a href="index.html" style="display: block; margin-top: 1rem;">Back to Home</a>
            <a href="#" id="forgot-password-link">Forgot Password?</a>
        </section>

        <section id="admin-panel" style="display: none;">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Dashboard</h1>
                <button id="logout-btn" style="background: var(--dark);">Logout</button>
            </header>
            
            <div class="dashboard-grid">
                <div class="main-content">
                    <div class="interaction-box">
                        <h2>Create a New Post</h2>
                        <input type="text" id="post-title" placeholder="Post Title">
                        <div id="editor" style="height: 250px; margin-bottom: 1rem;"></div> <!-- Quill editor -->
                        <button id="upload-widget" style="background: var(--gray); margin-bottom: 1rem;">Upload Image</button>
                        <img id="preview-img" src="" style="display:none; width: 100%; border-radius: 8px; margin: 1rem 0;">
                        <button id="submit-post" style="width: 100%;">Publish Post</button>
                    </div>

                    <h2 style="margin-top: 3rem;">Manage Existing Posts</h2>
                    <div id="existing-posts" class="blog-grid" style="margin-top: 1rem;">
                        <!-- Existing posts will be loaded here by JS -->
                    </div>
                </div>

                <aside class="sidebar">
                    <div class="interaction-box">
                        <h2>User Interactions</h2>
                        <div id="interactions-summary">
                            <p>Loading interactions...</p>
                        </div>
                        <div id="chats-list" style="margin-top: 2rem;">
                            <!-- User questions will load here -->
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </div>

    <script type="module" src="js/admin.js"></script>
    <!-- Quill.js JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="js/reset.js"></script>
</body>
</html>
